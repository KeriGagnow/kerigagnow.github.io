<header class="site-header">
  <div class="site-shell site-hero">
    <h1>Contact Me</h1>
    <p>Send me a message or use the form below to get in touch.</p>
  </div>
</header>

<nav class="site-nav" aria-label="Primary navigation">

    <li><a href="Aboutme.html"><svg class="nav-icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M20 21a8 8 0 0 0-16 0"></path><circle cx="12" cy="8" r="4"></circle></svg>About Me</a></li>
    <li><a href="resume.html"><svg class="nav-icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M7 3h8l4 4v14H7z"></path><path d="M15 3v4h4"></path><path d="M9 11h6"></path><path d="M9 15h6"></path></svg>Resume</a></li>

    <li><a href="projects.html"><svg class="nav-icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"></path></svg>Projects</a></li>
  </ul>

<form action="https://formsubmit.co/gagnowkeri@gmail.com" method="POST">

<div class="background">
  <div class="container">
    <div class="screen">
      <div class="screen-header">
        <div class="screen-header-left">
          <div class="screen-header-button close"></div>
          <div class="screen-header-button maximize"></div>
          <div class="screen-header-button minimize"></div>
        </div>
        <div class="screen-header-right">
          <div class="screen-header-ellipsis"></div>
          <div class="screen-header-ellipsis"></div>
          <div class="screen-header-ellipsis"></div>
        </div>
      </div>
      <div class="screen-body">
        <div class="screen-body-item left">
          <div class="app-title">
            <span>CONNECT</span>
            <span>WITH ME!</span>
          </div>
          
        </div>
        <div class="screen-body-item">
          <div class="app-form">
            <div class="app-form-group">
              <input type="text" class="app-form-control" placeholder="NAME" name="name">
            </div>
            <div class="app-form-group">
              <input type="email" class="app-form-control" placeholder="EMAIL" name="email">
            </div>
            <div class="app-form-group">
              <input type="tel" class="app-form-control" placeholder="CONTACT NO" name="contact">
            </div>
            <div class="app-form-group message">
              <textarea class="app-form-control" placeholder="MESSAGE" name="message" rows="4"></textarea>
            </div>
            <div class="app-form-group buttons">
              <button class="app-form-button">CANCEL</button>
              <button class="app-form-button" type="submit">SEND</button>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

</form>

</body>
</html>
